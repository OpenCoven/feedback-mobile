repos:
  # Gitleaks — secret scanning on every commit
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  # SwiftLint — Swift style and lint
  - repo: local
    hooks:
      - id: swiftlint
        name: SwiftLint
        language: system
        entry: swiftlint lint --strict --config .swiftlint.yml
        types: [swift]
        pass_filenames: false

  # Block xcconfig files with real secrets (use .xcconfig.template instead)
  - repo: local
    hooks:
      - id: block-xcconfig-secrets
        name: Block xcconfig secrets
        language: script
        entry: scripts/check-xcconfig.sh
        pass_filenames: false
        types: []

  # Trailing whitespace + merge conflicts
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: '\.md$'
      - id: end-of-file-fixer
        exclude: '\.xcassets/|\.png$|\.pdf$'
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: mixed-line-ending
        args: ['--fix=lf']
