included:
  - FeedbackApp/
  - Sources/
  - Tests/

excluded:
  - .build/
  - DerivedData/

disabled_rules:
  - line_length
  - trailing_comma
  - force_unwrapping
  - force_try
  - todo

opt_in_rules:
  - array_init
  - closure_spacing
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - empty_collection_literal
  - empty_string
  - explicit_init
  - fatal_error_message
  - first_where
  - last_where
  - multiline_parameters
  - overridden_super_call
  - sorted_imports
  - toggle_bool
  - yoda_condition

type_body_length:
  warning: 300
  error: 400

file_length:
  warning: 500
  error: 800

function_body_length:
  warning: 60
  error: 100

cyclomatic_complexity:
  warning: 10
  error: 20

identifier_name:
  min_length:
    warning: 2
    error: 1
  excluded:
    - id
    - x
    - y
    - r
    - g
    - b
    - p
    - w
    - m
    - vc
    - pc
    - wv
    - t
    - k
    - v
    - d
    - c
    - l
    - n
    - a
