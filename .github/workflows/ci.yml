name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test & Lint (SPM)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Show Swift toolchain
        run: swift --version

      - name: Run package tests
        run: swift test

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: SwiftLint (strict)
        run: swiftlint lint --strict --config .swiftlint.yml

  ios-build:
    name: Build SDK for iOS
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode
        run: xcodebuild -version

      # Builds the package for the iOS Simulator SDK, compiling the
      # `#if canImport(UIKit)` path (WebView, launcher, panel) that `swift test`
      # on macOS does not. xcodebuild generates the package project in the
      # runner's own compatible format — no XcodeGen version coupling.
      - name: Build OpenCovenFeedback (iOS Simulator)
        run: |
          xcodebuild build \
            -scheme OpenCovenFeedback \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO
