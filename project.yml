name: FeedbackApp
options:
  bundleIdPrefix: dev.opencoven
  deploymentTarget:
    iOS: "15.0"
  xcodeVersion: "15"
  generateEmptyDirectories: true

packages:
  OpenCovenFeedback:
    path: .

settings:
  base:
    SWIFT_VERSION: "5.9"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""

targets:
  FeedbackApp:
    type: application
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - path: FeedbackApp/Sources/FeedbackApp
        excludes:
          - "**/*.md"
    resources:
      - path: FeedbackApp/Sources/FeedbackApp/Resources
        optional: true
    dependencies:
      - package: OpenCovenFeedback
    info:
      path: FeedbackApp/Sources/FeedbackApp/Info.plist
      properties:
        CFBundleName: "$(PRODUCT_NAME)"
        CFBundleDisplayName: OpenCoven Feedback
        CFBundleIdentifier: "$(PRODUCT_BUNDLE_IDENTIFIER)"
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchStoryboardName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.opencoven.feedback
        INFOPLIST_FILE: FeedbackApp/Sources/FeedbackApp/Info.plist

  FeedbackPortalApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App/FeedbackPortalApp
        excludes:
          - "**/*.md"
    dependencies:
      - package: OpenCovenFeedback
        product: FeedbackKit
    info:
      path: App/FeedbackPortalApp/Info.plist
      properties:
        CFBundleName: "$(PRODUCT_NAME)"
        CFBundleDisplayName: Feedback Portal
        CFBundleIdentifier: "$(PRODUCT_BUNDLE_IDENTIFIER)"
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchStoryboardName: ""
        FEEDBACK_INSTANCE_URL: "$(FEEDBACK_INSTANCE_URL)"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.opencoven.feedbackportal
        INFOPLIST_FILE: App/FeedbackPortalApp/Info.plist
        FEEDBACK_INSTANCE_URL: "http://localhost:3000"

schemes:
  FeedbackPortalApp:
    build:
      targets:
        FeedbackPortalApp: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
